name: PR Checks

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-configuration-cache

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-report
          path: '**/build/reports/lint-results-debug.html'

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew detekt --no-configuration-cache

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ktlint
        run: |
          chmod +x scripts/ktlint
          scripts/ktlint --relative '**/*.kt' '!**/build/**' --reporter=plain

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug --no-configuration-cache

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk
          retention-days: 7
